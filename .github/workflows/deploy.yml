name: todo-hunter ci/cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Set test environment variables
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> .env
          echo "NODE_ENV=test" >> .env
          echo "NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check code style
        run: npm run lint

      - name: Check for npm audit vulnerabilities
        run: npm run audit
        continue-on-error: true

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, todohunter-runner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # ⚠️ 중요: .env 는 build 전에 완전히 채워져 있어야 함
      # (NEXT_PUBLIC_* 환경변수는 빌드 시점에 정적으로 번들에 박히기 때문)
      - name: Write .env (full production secrets)
        run: |
          cat > .env <<EOF
          # DB / Cache
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}

          # JWT
          ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
          ACCESS_TOKEN_EXPIRES=${{ secrets.ACCESS_TOKEN_EXPIRES }}
          REFRESH_TOKEN_EXPIRES=${{ secrets.REFRESH_TOKEN_EXPIRES }}

          # SMTP (이메일 인증)
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER_EMAIL=${{ secrets.SMTP_USER_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}

          # 카카오 OAuth
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}

          # Anthropic (퀘스트 분할 AI, 사용 중이면)
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

          # Sentry (에러 모니터링)
          NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG=${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

          # 앱 기본 URL (서버사이드에서 쓸 경우)
          DEFAULT_API_URL=${{ secrets.DEFAULT_API_URL }}

          # 운영
          NODE_ENV=production
          TZ=Asia/Seoul
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Ensure deployment directory
        run: mkdir -p /home/todohunter/todohunter-repo/todohunter-app

      - name: Rsync to deployment directory
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            ./ /home/todohunter/todohunter-repo/todohunter-app/

      - name: Install production dependencies on target
        working-directory: /home/todohunter/todohunter-repo/todohunter-app
        run: |
          npm ci --omit=dev
          npx prisma generate

      - name: Run Prisma migrations
        working-directory: /home/todohunter/todohunter-repo/todohunter-app
        run: npx prisma migrate deploy

      - name: Ensure ecosystem.config.js exists at target
        run: |
          cp /home/todohunter/todohunter-repo/todohunter-app/deploy/ecosystem.config.js /home/todohunter/ecosystem.config.js

      - name: PM2 reload or start
        run: |
          if pm2 list | grep -q "todohunter-app"; then
            echo "Reloading existing PM2 process"
            pm2 reload /home/todohunter/ecosystem.config.js --only todohunter-app --update-env
          else
            echo "Starting new PM2 process"
            pm2 start /home/todohunter/ecosystem.config.js --only todohunter-app
          fi
          pm2 save

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -fsS http://localhost:3050/ > /dev/null; then
              echo "✅ App is responding on :3050"
              exit 0
            fi
            echo "⏳ waiting for app ($i/5)..."
            sleep 3
          done
          echo "❌ App did not respond after 20s"
          pm2 logs todohunter-app --lines 30 --nostream
          exit 1
